<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Listing 优化引擎 · 加载中</title>
<meta http-equiv="refresh" content="0; url=./frontend/index.html">
<link rel="canonical" href="./frontend/index.html">
<style>
  html,body{margin:0;padding:0;font:14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a2b4e;background:#faf9fc}
  .wrap{max-width:560px;margin:80px auto;padding:0 24px;text-align:center}
  h1{font-size:22px;margin:0 0 12px;color:#7C3AED}
  p{margin:8px 0;color:#4a5680}
  a{color:#7C3AED;font-weight:600;text-decoration:none;border-bottom:1px solid currentColor}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #e5d9f6;border-top-color:#7C3AED;border-radius:50%;animation:s 0.9s linear infinite;vertical-align:-2px;margin-right:8px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>AI Listing 优化引擎</h1>
  <p><span class="spin"></span>正在加载前端页面…</p>
  <p>如果没有自动跳转，请点击 <a href="./frontend/index.html">进入原型</a></p>
</div>
<script>location.replace('./frontend/index.html' + location.search + location.hash);</script>
</body>
</html>
